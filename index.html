<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Шахматы и Шашки Hybrid</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-menu" class="screen active">
        <div class="settings-wrapper">
            <div class="settings-hint">
                <span class="hint-text">Настройки</span>
                <span class="hint-arrow">↓</span>
            </div>
    
            <div id="settings-icon">⚙️</div>
            <div id="settings-menu" class="hidden-settings">
                <div class="setting-item-container">
                    <div class="setting-item">
                        <span>Смена сторон</span>
                        <label class="switch">
                            <input type="checkbox" id="setting-swap-btn-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div id="sub-setting-bot-swap" class="sub-setting-item">
                        <div class="setting-item">
                            <span>Во время хода бота</span>
                            <label class="switch">
                                <input type="checkbox" id="setting-swap-bot">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="setting-item">
                    <span>Отмена ходов</span>
                    <label class="switch">
                        <input type="checkbox" id="setting-undo-redo">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="setting-item">
                    <span>Обязательное взятие (Шашки)</span>
                    <label class="switch">
                        <input type="checkbox" id="setting-must-capture" checked>
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="setting-item-container">
                    <div class="setting-item">
                        <span>Добавление фигур</span>
                        <label class="switch">
                            <input type="checkbox" id="setting-edit-mode">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div id="sub-setting-add-turn" class="sub-setting-item">
                        <div class="setting-item">
                            <span>Считается ходом</span>
                            <label class="switch">
                                <input type="checkbox" id="setting-add-is-turn" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="setting-item" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <span>Скорость бота</span>
    <div class="speed-toggle-group" id="speed-toggle-group">
        <button type="button" class="speed-btn" data-speed="50">50 мс</button>
        <button type="button" class="speed-btn" data-speed="250">250 мс</button>
        <button type="button" class="speed-btn active" data-speed="500">500 мс</button> </div>
</div>

                </div>
            </div>
        </div>

        <h1>Выберите игру</h1>
        <div class="buttons-row">
            <button id="btn-chess" class="main-btn">Шахматы</button>
            <button id="btn-checkers" class="main-btn">Шашки</button>
            <button id="btn-hybrid" class="main-btn">Шахматы-Шашки</button>
        </div>
        
        <div id="mode-row" class="buttons-row" style="display: none; margin-top: 30px;">
            <button id="btn-pve" class="main-btn" style="background-color: #2196F3;">Против бота</button>
            <button id="btn-pvp" class="main-btn" style="background-color: #FF9800;">С другом (Офлайн)</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-bar">
            <button id="btn-exit">Выйти в меню</button>
            <div id="game-result-display"></div> 
        </div>
        
        <div class="game-container">
            <div class="board-outer-container">
                <div class="coords-y" id="coords-y"></div>
                <div class="board-main-area">
                    <div class="board-wrapper">
                        <div id="board"></div>
                        <div id="pieces-layer"></div>
                    </div>
                    <div class="coords-x" id="coords-x"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="info-panel" style="position: relative;">
                    <div class="info-row">Ход: <span id="turn-indicator">Белые</span></div>
                    <div class="info-row">Счёт: <span id="score-display">0 : 0</span></div>
    
                    <div class="history-nav">
                        <button id="btn-undo" class="nav-btn">↶</button>
                        <button id="btn-redo" class="nav-btn">↷</button>
                    </div>
                </div>

                <div class="controls">
                    <button id="btn-swap" class="action-btn hidden-btn" disabled>Поменять стороны</button>
                    <button id="btn-reset" class="action-btn">Сбросить доску</button>
                </div>

                <div id="edit-tools" class="edit-tools-container" style="display: none;">
                    <button id="add-piece-btn" class="btn-edit btn-green">Добавить</button>
                    <button id="remove-piece-btn" class="btn-edit btn-red">Удалить</button>
                </div>

                <div class="history-panel">
                    <h3>История ходов</h3>
                    <ul id="move-history"></ul>
                </div>
            </div>
        </div>
    </div>
    
    <div id="confirm-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <p>Вы уверены, что хотите удалить фигуру?</p>
            <div class="modal-buttons">
                <button id="confirm-yes" class="btn-edit btn-green" style="padding: 10px 20px;">Да</button>
                <button id="confirm-no" class="btn-edit btn-red" style="padding: 10px 20px;">Отмена</button>
            </div>
        </div>
    </div>
    
    <div id="add-piece-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content piece-picker-content">
            <h3 style="margin-bottom: 15px; color: #fff;">Выберите фигуру</h3>
            <div class="color-picker-row">
                <button id="picker-btn-white" class="picker-color-btn active-color">Белые</button>
                <button id="picker-btn-black" class="picker-color-btn">Чёрные</button>
            </div>
            <div id="pieces-grid" class="pieces-grid"></div>
            <button id="add-piece-cancel" class="btn-edit btn-red" style="margin-top: 15px; width: 100%; padding: 12px;">Отмена</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
